<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="160" fill="#FFF8F0"/>
  
  <!-- Bowl shadow -->
  <ellipse cx="200" cy="280" rx="115" ry="50" fill="#E6DCD2" opacity="0.5"/>
  
  <!-- Bowl -->
  <ellipse cx="200" cy="270" rx="120" ry="60" fill="#FAFAF8"/>
  <ellipse cx="200" cy="265" rx="110" ry="55" fill="#F5F5F2"/>
  
  <!-- Bowl rim -->
  <ellipse cx="200" cy="230" rx="120" ry="30" fill="#EBEBE6" stroke="#DCD7D2" stroke-width="3"/>
  
  <!-- Rice mound -->
  <ellipse cx="200" cy="185" rx="100" ry="60" fill="#FFFFFF"/>
  <ellipse cx="200" cy="180" rx="90" ry="55" fill="#FCFCFA"/>
  
  <!-- Rice grain details -->
  <ellipse cx="150" cy="175" rx="12" ry="6" fill="#F8F8F5" opacity="0.8"/>
  <ellipse cx="180" cy="165" rx="12" ry="6" fill="#F8F8F5" opacity="0.8"/>
  <ellipse cx="210" cy="170" rx="12" ry="6" fill="#F8F8F5" opacity="0.8"/>
  <ellipse cx="240" cy="175" rx="12" ry="6" fill="#F8F8F5" opacity="0.8"/>
  
  <!-- Small rice grains on top -->
  <ellipse cx="145" cy="155" rx="8" ry="4" fill="#FDFDFA" opacity="0.7"/>
  <ellipse cx="175" cy="150" rx="8" ry="4" fill="#FDFDFA" opacity="0.7"/>
  <ellipse cx="205" cy="148" rx="8" ry="4" fill="#FDFDFA" opacity="0.7"/>
  <ellipse cx="235" cy="152" rx="8" ry="4" fill="#FDFDFA" opacity="0.7"/>
  <ellipse cx="260" cy="158" rx="8" ry="4" fill="#FDFDFA" opacity="0.7"/>
  
  <!-- Chopsticks -->
  <line x1="290" y1="50" x2="330" y2="190" stroke="#8B5A2B" stroke-width="8" stroke-linecap="round"/>
  <line x1="305" y1="45" x2="345" y2="185" stroke="#A06E3C" stroke-width="8" stroke-linecap="round"/>
</svg>